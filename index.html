<html>
    <head>
        <title><b>FORM</b></title>
    </head>
    <body>
        <p><b>please full fill the form correctly</b></p>
        <form>
             <label for="username">Enter your name:</label>
        <input type="text" id="username" name="username">
       <br><label for="age">Enter your age:</label>
        <input type="number" id="age" name="age" min="1" max="120">
<br><label>Select your gender:</label><br>
<label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="3" cols="30" placeholder="Enter your full address"></textarea><br><br>

        <!-- Date of Birth -->
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"><br><br>



        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label><br>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label><br>
<br><label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="example@domain.com"><br><br>
<label for="hobby">Select your hobby:</label>
<br><select id="hobby" name="hobby">
    <option value="Reading">Reading</option>
    <option value="Sports">Sports</option>
    <option value="Music">Music</option>
    <option value="Traveling">Traveling</option>
    <option value="Gaming">Gaming</option>
</select><br><br>



        <button type="submit">Submit</button>

        </form>
    </body>
</html>
